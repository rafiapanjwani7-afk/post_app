    <div class="auth-container">
        <div class="auth-header">
            <h1>Postify</h1>
            <p>Create your account to get started!</p>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name" id="signName" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" id="signEmail" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="number" class="form-control" placeholder="Enter your phone number" id="signNumber" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="••••••••" id="signPassword" required>
            </div>
            
            <button type="submit" class="btn-auth">Sign Up</button>
            <div class="text-center my-3 text-muted">
                <small>OR</small>
            </div>
            
            <button type="button" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center gap-2 py-2" id="googleLoginBtn" onclick="loginWithGoogle()">
                <i class="bi bi-google text-danger"></i> Continue with Google
            </button>
        </form>
       
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
