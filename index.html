<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Postify</h1>
            <p>Create your account to get started!</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" placeholder="jhon" id="firstName" required>
            </div>
            <div class="form-group">
                <label>last Name</label>
                <input type="text" class="form-control" placeholder="Deo" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="example@gmail.com" id="signEmail" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="number" class="form-control" placeholder="+92 300 1234567" id="signNumber"
                    required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="••••••••" id="signPassword" required>
            </div>
            <button type="submit" class="btn-auth">Sign Up</button>
            <button type="button"
                class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center gap-2 btn-auth"
                id="googleLoginBtn" onclick="loginWithGoogle()">
                <img src="images/google.png" alt="google icon" class="gimg" style="width: 18px; height: 18px;">
                Continue with Google
            </button>
        </form>


        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="JS/auth.js" type="module"></script>
</body>

</html>
