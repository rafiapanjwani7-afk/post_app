<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postify - Welcome</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/auth.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="auth-wrapper">
        <div class="card auth-card">


            <!-- Header Box -->
            <div class="brand-header-box">



                <div class="brand-text">
                    <h2 class="brand-title"> Postify</h2>
                    <!-- Dynamic Subtitle -->
                    <p class="brand-subtitle" id="headerSubtitle">Create your account to get started!</p>
                </div>
            </div>

            <!-- Tabs (Sign Up Pehle) -->
            <ul class="nav nav-pills custom-tabs mb-4" id="authTab" role="tablist">
                <li class="nav-item w-50" role="presentation">
                    <button class="nav-link active w-100" id="signup-tab" data-bs-toggle="pill"
                        data-bs-target="#signup-panel" type="button" role="tab">Sign Up</button>
                </li>
                <li class="nav-item w-50" role="presentation">
                    <button class="nav-link w-100" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-panel"
                        type="button" role="tab">Login</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabContent">

                <!-- SIGNUP FORM (Pehle Load Hoga) -->
                <div class="tab-pane fade show active" id="signup-panel" role="tabpanel">
                    <form id="signupForm">
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="form-group mb-2">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="signEmail" class="form-control" placeholder="name@example.com"
                                required>
                        </div>

                        <div class="form-group mb-2">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" id="signNumber" class="form-control" placeholder="03001234567" required>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="signPassword" class="form-control" placeholder="••••••••"
                                required>
                        </div>

                        <button type="submit" class="btn btn-teal w-100 mb-2">
                            <span>Create Account</span>
                            <i class="fa-solid fa-user-plus ms-2"></i>
                        </button>
                    </form>

                    <div class="divider text-center my-2">
                        <span>OR </span>
                    </div>

                    <button type="button" onclick="loginWithGoogle()" class="btn google-btn w-100">
                        <img src="images/google.png" alt="Google" width="18" class="me-2">
                        <span>Continue with Google</span>
                    </button>
                </div>

                <!-- LOGIN FORM (Baad Mein Hoga) -->
                <div class="tab-pane fade" id="login-panel" role="tabpanel">
                    <form id="loginForm">
                        <div class="form-group mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-envelope input-icon"></i>
                                <input type="email" id="email" class="form-control" placeholder="name@example.com"
                                    required>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" id="password" class="form-control" placeholder="••••••••"
                                    required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-teal w-100 mb-3">
                            <span>Login to Account</span>
                            <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </form>

                    <div class="divider text-center my-3">
                        <span>OR </span>
                    </div>

                    <button type="button" onclick="loginWithGoogle()" class="btn google-btn w-100">
                        <img src="images/google.png" alt="Google" width="18" class="me-2">
                        <span>Continue with Google</span>
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="JS/auth.js"></script>
</body>

</html>
