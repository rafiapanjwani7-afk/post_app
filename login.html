    <div class="auth-container">
    <div class="auth-header">
        <h1>Postify</h1>
        <p>Welcome back! Please login to your account.</p>
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" placeholder="Enter your email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" placeholder="••••••••" id="password" required>
        </div>
        
        <button type="submit" class="btn-auth">Sign In</button>
        <div class="text-center my-3 text-muted">
            <small>OR</small>
        </div>
        
        <button type="button" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center gap-2 py-2" id="googleLoginBtn" onclick="loginWithGoogle()">
            <i class="bi bi-google text-danger"></i> Continue with Google
        </button>

    </form>
    
    <div class="auth-footer">
        Don't have an account?<a href="index.html">Create one</a>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
