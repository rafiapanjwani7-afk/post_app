<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup - Create Control Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS/adminauth.css">
   
</head>

<body>

  <div class="signup-card text-center">
    <div class="mb-2">
        <i class="bi bi-person-badge-fill card-header-icon"></i>
    </div>
    
    <h2 class="signup-title">Create Admin Account</h2>
    <p class="login-subtitle mb-3">Access full control panel & manage system</p>

    
    <form id="adminSignupForm">
        <div class="d-flex gap-2 mb-2">
            <div class="form-group flex-fill">
                <label for="firstName">First Name</label>
                <div class="input-wrapper">
                <i class="bi bi-person input-icon"></i>
                <input type="text" id="firstName" class="form-control" placeholder="John" required>
            </div>
            </div>
            <div class="form-group flex-fill">
                <label for="lastName">Last Name</label>
                <div class="input-wrapper">
                <i class="bi bi-person input-icon"></i>
                <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
            </div>
            </div>
        </div>

        <div class="form-group mb-2">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="admin@gmail.com" required>
        </div>
        </div>

        <div class="form-group mb-3">
            <label for="password">Password</label>
           <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        </div>

        <button type="submit" class="signup-btn d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-check-circle-fill"></i> Complete Signup
        </button>
            <div class="text-center mt-2">
    <a href="adminlogin.html" class="register-link">
        <i class="bi bi-arrow-left"></i> Return to Login
    </a>
</div>
    </form>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="JS/adminauth.js"></script>
</body>

</html>
