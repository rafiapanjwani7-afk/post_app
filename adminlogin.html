<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="CSS/adminauth.css">

</head>

<body>

    <div class="login-card">
        <div class="mb-1">
            <i class="bi bi-shield-lock-fill card-header-icon"></i>
        </div>
        
        <h2 class="login-title">Admin Portal</h2>
        <div class="login-subtitle">Sign in with Admin credentials</div>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminEmail">Admin Email</label>
                <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="admin@gmail.com" required>
        </div>
            </div>

            <div class="form-group">
                <label for="adminPassword">Password</label>
                <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Access Dashboard
            </button>
        </form>

        <a href="adminsign.html" class="register-link">Register New Admin</a>
    </div>
          
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="JS/adminauth.js"></script>
</body>

</html>
